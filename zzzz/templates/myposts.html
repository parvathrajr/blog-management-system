<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Posts</title>

<style>

/* ================= BG + GLOBAL STYLES ================= */
body.myposts-page {
    margin: 0;
    font-family: "Inter", sans-serif;
    display: flex;
    color: #fff;
    background:
        linear-gradient(rgba(0,0,0,0.87), rgba(0,0,0,0.87)),
        url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") left center/50% 100% no-repeat,
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") right center/50% 100% no-repeat;
    background-blend-mode: overlay;
}

/* ================= MAIN AREA ================= */
.main-content {
    flex: 1;
    padding: 40px;
    padding-right: 280px; /* space for right navbar */
}

.header {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 30px;
}

/* ================= POSTS GRID ================= */
.posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
}

/* ================= POST CARD ================= */
.post-card {
    background: rgba(255,255,255,0.06);
    padding: 18px;
    border-radius: 18px;
    backdrop-filter: blur(12px);
    transition: 0.35s ease;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
}

.post-card:hover {
    transform: translateY(-8px) scale(1.02);
    background: rgba(255,255,255,0.12);
}

/* Post Image */
.post-img {
    width: 100%;
    height: 170px;
    border-radius: 14px;
    object-fit: cover;
    margin-bottom: 15px;
}

/* Post Title */
.post-card h3 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
}

/* Post Category */
.category {
    display: inline-block;
    margin: 8px 0;
    padding: 5px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    font-size: 13px;
}

/* Post Content */
.post-card p {
    font-size: 15px;
    color: #ccc;
    margin-top: 5px;
}

/* ================= RIGHT NAVBAR ================= */
.right-navbar {
    width: 260px;
    height: 100vh;
    position: fixed;
    right: 0;
    top: 0;
    padding: 35px 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border-left: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
}

.nav-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 40px;
    text-align: center;
}

/* Nav Buttons */
.nav-btn {
    display: block;
    padding: 12px 15px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.nav-btn:hover {
    background: #ffffff;
    color: #000;
}

</style>
</head>

<body class="myposts-page">

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="header">My Posts</div>

    <div class="posts-grid">

        {% for post in posts %}
        <div class="post-card">
            <img src="/static/uploads/{{ post.image }}" class="post-img">

            <h3>{{ post.title }}</h3>

            <span class="category">{{ post.category }}</span>

            <p>{{ post.content|truncate(120) }}</p>

            <a href="/post/{{ post.id }}" style="
                display:block;
                margin-top:10px;
                padding:8px 12px;
                width:max-content;
                background:#fff;
                color:#000;
                border-radius:6px;
                font-size:14px;
                text-decoration:none;
                font-weight:600;
                transition:0.3s;">
                Read More →
            </a>
        </div>
        {% else %}
        <p style="color:#ccc;">No posts found.</p>
        {% endfor %}

    </div>
</div>

<!-- RIGHT NAVBAR -->
<div class="right-navbar">
    <div class="nav-title">DASHBOARD</div>

    <a href="/dashboard" class="nav-btn">Dashboard</a>
    <a href="/add" class="nav-btn">Create Post</a>
    <a href="/myposts" class="nav-btn">My Posts</a>
    <a href="/logout" class="nav-btn">Logout</a>
</div>

</body>
</html>
